<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commerce Teach — Economics Ch 1</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#192E1C;--panel:#1F3526;--panel2:#243D2B;--border:#2d5035;
  --text:#EDE8D5;--yel:#FFD94A;--blue:#7EC8E3;--red:#F08080;
  --grn:#8FD68A;--muted:#8AB496;--pur:#C9A8E2;
  --sw:210px;--th:58px;--tw:62px;
}
body{font-family:'Poppins',sans-serif;background:#0d1a10;color:var(--text);
  height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none}

/* ── TOP BAR ── */
#topbar{height:var(--th);background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:50}
.logo{font-size:18px;font-weight:700;color:var(--yel);margin-right:6px;white-space:nowrap}
.sep{width:1px;height:32px;background:var(--border);margin:0 4px;flex-shrink:0}
#deck-title-input{background:transparent;border:none;border-bottom:1px solid transparent;
  color:var(--text);font-size:13px;font-family:'Poppins',sans-serif;width:300px;
  padding:4px 6px;transition:border-color .2s;flex-shrink:0}
#deck-title-input:focus{outline:none;border-bottom-color:var(--yel)}
.spacer{flex:1}
.tb-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;
  border:1px solid transparent;background:transparent;color:var(--text);cursor:pointer;
  font-size:12px;font-family:'Poppins',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tb-btn:hover{background:var(--panel2);border-color:var(--border)}
.tb-btn.pr{background:var(--yel);color:#192E1C;font-weight:600;border-color:transparent}
.tb-btn.pr:hover{background:#ffcf20}
.tb-btn span.ic{font-size:15px}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:var(--sw);background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#sb-hd{padding:9px 12px;font-size:10px;font-weight:600;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
#add-btn{background:none;border:none;cursor:pointer;color:var(--yel);font-size:22px;
  line-height:1;padding:0 2px;transition:transform .15s}
#add-btn:hover{transform:scale(1.2)}
#slides-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
#slides-list::-webkit-scrollbar{width:4px}
#slides-list::-webkit-scrollbar-thumb{background:#2d5035;border-radius:2px}
.s-thumb{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:all .15s;background:var(--bg);flex-shrink:0}
.s-thumb:hover{border-color:var(--muted)}
.s-thumb.active{border-color:var(--yel)}
.s-thumb-inner{aspect-ratio:16/9;display:flex;flex-direction:column;
  justify-content:center;align-items:flex-start;padding:8px 10px;gap:3px}
.s-thumb-num{font-size:9px;color:var(--muted);font-weight:600}
.s-thumb-title{font-size:10px;color:var(--text);font-weight:500;
  line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.s-thumb-del{position:absolute;top:4px;right:4px;background:rgba(240,128,128,.2);
  border:none;cursor:pointer;color:var(--red);font-size:13px;width:20px;height:20px;
  border-radius:4px;display:none;align-items:center;justify-content:center}
.s-thumb:hover .s-thumb-del{display:flex}
.s-thumb-del:hover{background:rgba(240,128,128,.4)}

/* ── SLIDE AREA ── */
#slide-area{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:16px;background:#0d1a10;overflow:hidden;position:relative}
#slide-wrapper{position:relative;box-shadow:0 8px 48px rgba(0,0,0,.7);border-radius:4px;
  overflow:hidden;max-width:100%;max-height:calc(100vh - var(--th) - 70px)}
#slide-content{width:1280px;height:720px;transform-origin:top left;
  background:var(--bg);position:relative;overflow:hidden;pointer-events:none}
#draw-canvas{position:absolute;top:0;left:0;width:100%;height:100%;
  cursor:crosshair;touch-action:none;z-index:20}
#nav-bar{margin-top:12px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:7px 20px;cursor:pointer;font-size:13px;
  font-family:'Poppins',sans-serif;transition:all .15s}
.nav-btn:hover:not(:disabled){background:var(--panel2)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
#slide-ind{color:var(--muted);font-size:13px;min-width:70px;text-align:center}

/* ── TOOLS PANEL ── */
#tools-panel{width:var(--tw);background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:6px;
  overflow-y:auto;flex-shrink:0}
.tool-btn{width:42px;height:42px;background:transparent;border:1px solid transparent;
  border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:var(--muted);font-size:19px;flex-shrink:0}
.tool-btn:hover{background:var(--panel2);color:var(--text);border-color:var(--border)}
.tool-btn.active{background:var(--yel) !important;color:#192E1C !important;border-color:var(--yel) !important}
.t-sep{width:34px;height:1px;background:var(--border);flex-shrink:0}
.t-lbl{font-size:8px;color:var(--muted);letter-spacing:.05em;text-align:center}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .15s;flex-shrink:0}
.color-dot:hover{transform:scale(1.2)}
.color-dot.active{border-color:white;box-shadow:0 0 0 1px rgba(255,255,255,.4)}
#sz-slider{writing-mode:vertical-lr;direction:rtl;height:75px;width:4px;
  -webkit-appearance:none;background:var(--border);border-radius:2px;
  outline:none;cursor:pointer}
#sz-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--yel);cursor:pointer}
#sz-label{font-size:9px;color:var(--muted)}
#opacity-slider{writing-mode:vertical-lr;direction:rtl;height:60px;width:4px;
  -webkit-appearance:none;background:var(--border);border-radius:2px;
  outline:none;cursor:pointer}
#opacity-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--blue);cursor:pointer}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:24px;width:520px;max-height:80vh;overflow-y:auto}
#modal h3{font-size:17px;color:var(--yel);margin-bottom:14px;font-weight:600}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tpl-card{background:var(--bg);border:2px solid var(--border);border-radius:10px;
  padding:14px;cursor:pointer;transition:all .15s}
.tpl-card:hover,.tpl-card.sel{border-color:var(--yel)}
.tpl-card.sel{background:var(--panel2)}
.tpl-preview{aspect-ratio:16/9;background:var(--panel2);border-radius:6px;
  margin-bottom:8px;display:flex;align-items:center;justify-content:center;
  font-size:24px;color:var(--muted)}
.tpl-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.tpl-desc{font-size:10px;color:var(--muted)}
.m-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.m-group label{font-size:11px;color:var(--muted)}
.m-inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;color:var(--text);font-size:13px;font-family:'Poppins',sans-serif;width:100%}
.m-inp:focus{outline:none;border-color:var(--yel)}
.m-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.m-btn{padding:8px 20px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text);cursor:pointer;font-size:13px;
  font-family:'Poppins',sans-serif;transition:all .15s}
.m-btn:hover{background:var(--panel2)}
.m-btn.ok{background:var(--yel);color:#192E1C;font-weight:600;border-color:transparent}
.m-btn.ok:hover{background:#ffcf20}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;
  transition:all .3s;z-index:300;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PRESENTATION MODE ── */
#pres-mode{display:none;position:fixed;inset:0;background:#000;z-index:500;
  align-items:center;justify-content:center;flex-direction:column}
#pres-mode.show{display:flex}
#pres-wrapper{position:relative;max-width:100vw;max-height:100vh}
#pres-content{width:1280px;height:720px;transform-origin:top left;
  background:var(--bg);pointer-events:none}
#pres-canvas{position:absolute;top:0;left:0;cursor:crosshair;touch-action:none;z-index:10}
#pres-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;align-items:center;opacity:0;transition:opacity .3s}
#pres-mode:hover #pres-bar{opacity:1}
.p-btn{background:rgba(31,53,38,.9);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;
  font-family:'Poppins',sans-serif;backdrop-filter:blur(8px)}
.p-btn:hover{background:rgba(36,61,43,.9)}
.p-exit{color:var(--red)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
/*  SLIDE CONTENT STYLES  (virtual canvas: 1280×720)       */
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.si{width:1280px;height:720px;padding:32px 38px 28px;display:flex;
  flex-direction:column;font-family:'Poppins',sans-serif;position:relative;overflow:hidden}

/* Decorative corner dots */
.si::before{content:'';position:absolute;top:14px;right:14px;width:6px;height:6px;
  border-radius:50%;background:var(--border)}
.si::after{content:'';position:absolute;bottom:14px;left:14px;width:6px;height:6px;
  border-radius:50%;background:var(--border)}

/* Header row */
.hrow{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-shrink:0}
.hbadge{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;line-height:1}
.htitle{font-size:28px;font-weight:700;line-height:1.2}
.hdiv{height:2px;border-radius:1px;margin-bottom:18px;flex-shrink:0}

/* Cards */
.card{background:var(--panel);border-radius:12px;padding:20px 22px;
  box-shadow:0 4px 20px rgba(0,0,0,.35);display:flex;flex-direction:column}
.ctitle{font-size:15px;font-weight:700;margin-bottom:12px;padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.cbody{list-style:none;display:flex;flex-direction:column;gap:7px;flex:1;overflow:hidden}
.cbody li{font-size:13px;color:var(--text);line-height:1.45;
  padding-left:14px;position:relative}
.cbody li::before{content:'›';position:absolute;left:0;color:var(--yel);font-weight:700}
.cbody li b{color:var(--yel);font-weight:600}

/* Layout grids */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;min-height:0}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;flex:1;min-height:0}

/* Title slide */
.title-si{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;text-align:center;gap:10px;position:relative}
.t-eyebrow{font-size:13px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.t-pre{font-size:26px;color:var(--text);font-weight:300}
.t-main{font-size:72px;font-weight:700;color:var(--yel);line-height:1;margin:8px 0}
.t-pills{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.t-pill{background:var(--panel);border:1px solid var(--border);border-radius:20px;
  padding:7px 18px;font-size:13px;color:var(--blue)}
.t-cta{background:var(--yel);color:#192E1C;border-radius:24px;
  padding:10px 36px;font-size:15px;font-weight:700;margin-top:20px;display:inline-block}
.t-deco1{position:absolute;top:30px;left:50px;font-size:60px;opacity:.05}
.t-deco2{position:absolute;bottom:40px;right:60px;font-size:60px;opacity:.05}

/* Chain row */
.chain-row{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:16px 24px;background:var(--panel);border-radius:10px;
  margin-bottom:16px;flex-shrink:0}
.chain-item{font-size:18px;font-weight:700;color:var(--yel)}
.chain-arrow{font-size:20px;color:var(--muted)}

/* Glossary grid */
.gloss-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;min-height:0}
.gcard{background:var(--panel);border-radius:10px;padding:14px 16px}
.gterm{font-size:13px;font-weight:700;color:var(--yel);margin-bottom:4px}
.gdef{font-size:12px;color:var(--text);line-height:1.45}

/* Highlight box */
.highlight-box{background:rgba(255,217,74,.08);border:1px solid rgba(255,217,74,.25);
  border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);
  flex-shrink:0;margin-bottom:14px;line-height:1.55}
.highlight-box b{color:var(--yel)}

/* Exam badge */
.exam-flag{background:var(--red);color:#fff;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:4px;display:inline-block;margin-bottom:8px}

/* Blank slide hint */
.blank-hint{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;color:var(--border)}
.blank-hint .bh-icon{font-size:48px}
.blank-hint .bh-text{font-size:15px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">📚 CommerceTeach</span>
  <div class="sep"></div>
  <input id="deck-title-input" value="Ch 1 — Introduction to Microeconomics">
  <div class="sep"></div>
  <button class="tb-btn" onclick="undoStroke()" title="Undo (Ctrl+Z)"><span class="ic">↩</span> Undo</button>
  <button class="tb-btn" onclick="clearSlideDrawing()" title="Clear all drawings on this slide"><span class="ic">🗑</span> Clear</button>
  <div class="spacer"></div>
  <button class="tb-btn" onclick="enterPresentation()"><span class="ic">⛶</span> Present</button>
  <button class="tb-btn" onclick="saveSlideAsPNG()"><span class="ic">🖼</span> Save PNG</button>
  <button class="tb-btn pr" onclick="exportAllPDF()"><span class="ic">📄</span> Export PDF</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sb-hd">
      <span>SLIDES</span>
      <button id="add-btn" onclick="openModal()" title="Add new slide">＋</button>
    </div>
    <div id="slides-list"></div>
  </div>

  <!-- SLIDE AREA -->
  <div id="slide-area">
    <div id="slide-wrapper">
      <div id="slide-content"></div>
      <canvas id="draw-canvas"></canvas>
    </div>
    <div id="nav-bar">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← Prev</button>
      <span id="slide-ind">1 / 1</span>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <!-- TOOLS PANEL -->
  <div id="tools-panel">
    <div class="t-lbl">TOOLS</div>
    <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')" title="Pen (P)">✏️</button>
    <button class="tool-btn" id="tool-highlighter" onclick="setTool('highlighter')" title="Highlighter (H)">🖊</button>
    <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')" title="Eraser (E)">🧹</button>
    <div class="t-sep"></div>
    <div class="t-lbl">COLOR</div>
    <div class="color-dot active" style="background:#FFD94A" data-color="#FFD94A" onclick="setColor(this)" title="Yellow"></div>
    <div class="color-dot" style="background:#EDE8D5" data-color="#EDE8D5" onclick="setColor(this)" title="White"></div>
    <div class="color-dot" style="background:#7EC8E3" data-color="#7EC8E3" onclick="setColor(this)" title="Blue"></div>
    <div class="color-dot" style="background:#8FD68A" data-color="#8FD68A" onclick="setColor(this)" title="Green"></div>
    <div class="color-dot" style="background:#F08080" data-color="#F08080" onclick="setColor(this)" title="Red"></div>
    <div class="color-dot" style="background:#C9A8E2" data-color="#C9A8E2" onclick="setColor(this)" title="Purple"></div>
    <div class="t-sep"></div>
    <div class="t-lbl">SIZE</div>
    <input type="range" id="sz-slider" min="1" max="30" value="4" oninput="updateSize(this.value)">
    <span id="sz-label">4px</span>
    <div class="t-sep"></div>
    <div class="t-lbl">OPACITY</div>
    <input type="range" id="opacity-slider" min="20" max="100" value="100" oninput="updateOpacity(this.value)">
  </div>
</div>

<!-- ADD SLIDE MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h3>➕ Add New Slide</h3>
    <div class="tpl-grid">
      <div class="tpl-card sel" data-tpl="blank" onclick="selectTpl(this,'blank')">
        <div class="tpl-preview">⬜</div>
        <div class="tpl-name">Blank Slide</div>
        <div class="tpl-desc">Empty canvas for free-form notes</div>
      </div>
      <div class="tpl-card" data-tpl="title" onclick="selectTpl(this,'title')">
        <div class="tpl-preview">📋</div>
        <div class="tpl-name">Title Slide</div>
        <div class="tpl-desc">Big heading with subtitle</div>
      </div>
      <div class="tpl-card" data-tpl="two-col" onclick="selectTpl(this,'two-col')">
        <div class="tpl-preview">◫</div>
        <div class="tpl-name">Two Column</div>
        <div class="tpl-desc">Compare two topics side by side</div>
      </div>
      <div class="tpl-card" data-tpl="bullet" onclick="selectTpl(this,'bullet')">
        <div class="tpl-preview">📝</div>
        <div class="tpl-name">Bullet List</div>
        <div class="tpl-desc">Single card with key points</div>
      </div>
    </div>
    <div id="modal-inputs">
      <div class="m-group" id="tpl-title-group">
        <label>Slide Title</label>
        <input class="m-inp" id="m-title" placeholder="e.g. Demand and Supply">
      </div>
      <div class="m-group" id="tpl-left-group" style="display:none">
        <label>Left Column Title</label>
        <input class="m-inp" id="m-left" placeholder="e.g. Microeconomics">
      </div>
      <div class="m-group" id="tpl-right-group" style="display:none">
        <label>Right Column Title</label>
        <input class="m-inp" id="m-right" placeholder="e.g. Macroeconomics">
      </div>
      <div class="m-group" id="tpl-sub-group" style="display:none">
        <label>Subtitle</label>
        <input class="m-inp" id="m-sub" placeholder="e.g. Class 11 CBSE Economics">
      </div>
    </div>
    <div class="m-foot">
      <button class="m-btn" onclick="closeModal()">Cancel</button>
      <button class="m-btn ok" onclick="addSlide()">Add Slide →</button>
    </div>
  </div>
</div>

<!-- PRESENTATION MODE -->
<div id="pres-mode">
  <div id="pres-wrapper">
    <div id="pres-content"></div>
    <canvas id="pres-canvas"></canvas>
  </div>
  <div id="pres-bar">
    <button class="p-btn" onclick="presNavigate(-1)">← Prev</button>
    <span style="color:var(--muted);font-size:13px" id="pres-ind">1 / 1</span>
    <button class="p-btn" onclick="presNavigate(1)">Next →</button>
    <div style="width:1px;height:24px;background:var(--border);margin:0 4px"></div>
    <button class="p-btn p-exit" onclick="exitPresentation()">✕ Exit</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let currentIdx = 0;

  // ── 8. PPC INTRO ──────────────────────────────────────
  { id:'s8', title:'Production Possibility Curve (PPC)', html:`
  <div class="si">
    <div class="hrow">
      <span class="hbadge" style="background:var(--yel);color:#192E1C">PPC</span>
      <span class="htitle" style="color:var(--yel)">Production Possibility Curve (PPC)</span>
    </div>
    <div class="hdiv" style="background:var(--yel)"></div>
    <div class="two-col">
      <div class="card">
        <div class="ctitle" style="color:var(--yel)">📊 What is PPC?</div>
        <ul class="cbody">
          <li>Also called: <b>Production Possibility Frontier (PPF)</b> or Transformation Curve</li>
          <li>A <b>curve</b> showing all possible combinations of two goods producible with given resources &amp; technology</li>
          <li>Shows the <b>MAXIMUM output combinations</b> (when resources used efficiently)</li>
          <li>Represents the <b>TRADE-OFF</b> between producing two goods</li>
          <li>X-axis: Good A (e.g. Wheat) &nbsp;|&nbsp; Y-axis: Good B (e.g. Cloth)</li>
          <li>Downward sloping — more of one = less of other</li>
        </ul>
      </div>
      <div class="card">
        <div class="ctitle" style="color:var(--blue)">📋 Assumptions of PPC</div>
        <ul class="cbody">
          <li>Only <b>TWO goods</b> are produced in the economy</li>
          <li>Resources are <b>FIXED</b> in quantity</li>
          <li>Technology remains <b>CONSTANT</b></li>
          <li>Resources are <b>FULLY and EFFICIENTLY</b> employed (on PPC)</li>
          <li>Resources are <b>NOT equally efficient</b> in all uses</li>
          <li>Time period is short — no change in resources/technology</li>
        </ul>
      </div>
    </div>
  </div>`},

  // ── 9. PPC SHAPE & POINTS ─────────────────────────────
  { id:'s9', title:'PPC — Shape & Points on the Curve', html:`
  <div class="si">
    <div class="hrow">
      <span class="hbadge" style="background:var(--yel);color:#192E1C">PPC</span>
      <span class="htitle" style="color:var(--yel)">PPC — Shape &amp; Points on the Curve</span>
    </div>
    <div class="hdiv" style="background:var(--yel)"></div>
    <div class="highlight-box">
      💡 <b>Draw PPC Here!</b> — Left side: Y-axis (Cloth) | Bottom: X-axis (Wheat) | Curve: concave bowed outward from origin | Mark points A (on PPC), B (inside PPC), C (outside PPC)
    </div>
    <div class="two-col">
      <div class="card">
        <div class="ctitle" style="color:var(--yel)">❓ Why is PPC Concave?</div>
        <ul class="cbody">
          <li>PPC is <b>CONCAVE to the origin</b> (bowed outward)</li>
          <li>Because of <b>INCREASING MRT</b> (Marginal Rate of Transformation)</li>
          <li>As we produce more of Good A, we sacrifice increasing amounts of Good B</li>
          <li><b>Why?</b> Resources are NOT equally efficient for all uses</li>
          <li>Resources transferred from more suitable to less suitable uses</li>
          <li>Result: MRT increases → PPC is concave shaped</li>
        </ul>
      </div>
      <div class="card">
        <div class="ctitle" style="color:var(--blue)">🎯 3 Types of Points</div>
        <ul class="cbody">
          <li>Point <b>ON PPC (A):</b> Fully efficient — all resources used optimally ✅</li>
          <li>Point <b>INSIDE PPC (B):</b> Inefficient — resources underused or unemployed ⚠️</li>
          <li>Point <b>OUTSIDE PPC (C):</b> Unattainable — beyond current capacity ❌</li>
          <li><b>Outward SHIFT:</b> Economic growth (more resources / better technology)</li>
          <li><b>Inward SHIFT:</b> Disaster, war, loss of resources</li>
        </ul>
      </div>
    </div>
  </div>`},

  // ── 10. OPPORTUNITY COST & MRT ────────────────────────
  { id:'s10', title:'Opportunity Cost & MRT', html:`
  <div class="si">
    <div class="hrow">
      <span class="hbadge" style="background:var(--yel);color:#192E1C">Ch 1</span>
      <span class="htitle" style="color:var(--yel)">Opportunity Cost &amp; MRT</span>
    </div>
    <div class="hdiv" style="background:var(--yel)"></div>
    <div class="two-col">
      <div class="card">
        <div class="ctitle" style="color:var(--red)">💰 Opportunity Cost</div>
        <ul class="cbody">
          <li><b>Definition:</b> Cost of the <b>NEXT BEST ALTERNATIVE FOREGONE</b></li>
          <li>Also called: Alternative Cost / Economic Cost</li>
          <li>Arises because resources are scarce &amp; have alternative uses</li>
          <li><b>Example 1:</b> ₹10,000 spent on phone instead of books → books = opportunity cost</li>
          <li><b>Example 2:</b> Student studying instead of working → salary given up is opportunity cost</li>
          <li><b>Example 3:</b> Land used for wheat instead of rice → rice is opportunity cost</li>
          <li>Key for making rational economic decisions</li>
        </ul>
      </div>
      <div class="card">
        <div class="ctitle" style="color:var(--grn)">📐 MRT — Marginal Rate of Transformation</div>
        <ul class="cbody">
          <li><b>MRT = Units of Good B sacrificed ÷ Units of Good A gained</b></li>
          <li>Also called: <b>Opportunity Cost Ratio</b></li>
          <li>MRT <b>INCREASES</b> as we move down along PPC (left → right)</li>
          <li>Increasing MRT → PPC is <b>CONCAVE</b> to origin ✅</li>
          <li>Constant MRT → PPC is a <b>STRAIGHT LINE</b></li>
          <li>Decreasing MRT → PPC is <b>CONVEX</b> to origin (rare)</li>
          <li>MRT = slope of PPC at any point</li>
        </ul>
      </div>
    </div>
  </div>`},

  // ── 12. POSITIVE vs NORMATIVE ─────────────────────────
  { id:'s12', title:'Positive vs Normative Economics', html:`
  <div class="si">
    <div class="hrow">
      <span class="hbadge" style="background:var(--yel);color:#192E1C">Ch 1</span>
      <span class="htitle" style="color:var(--yel)">Positive vs Normative Economics</span>
    </div>
    <div class="hdiv" style="background:var(--yel)"></div>
    <div class="two-col">
      <div class="card">
        <div class="ctitle" style="color:var(--blue)">✅ Positive Economics</div>
        <ul class="cbody">
          <li>Deals with <b>FACTS</b> — what IS, what WAS, what WILL BE</li>
          <li><b>Objective &amp; verifiable</b> — can be tested scientifically</li>
          <li>No value judgements involved</li>
          <li>Describes economic phenomena as they <b>actually are</b></li>
          <li>Uses statistical data &amp; empirical evidence</li>
          <li><b>Example 1:</b> "Unemployment rate in India is 7%"</li>
          <li><b>Example 2:</b> "When price rises, demand falls" (Law of Demand)</li>
          <li><b>Example 3:</b> "India's GDP grew by 6% last year"</li>
        </ul>
      </div>
      <div class="card">
        <div class="ctitle" style="color:var(--red)">💭 Normative Economics</div>
        <ul class="cbody">
          <li>Deals with <b>OPINIONS</b> — what OUGHT TO BE or SHOULD BE</li>
          <li><b>Subjective</b> — involves value judgements</li>
          <li>Cannot be tested or proved scientifically</li>
          <li>Prescribes what <b>policy should be adopted</b></li>
          <li>Based on ethical, moral or social values</li>
          <li><b>Example 1:</b> "Unemployment should be reduced to 3%"</li>
          <li><b>Example 2:</b> "Govt should provide free education to all"</li>
          <li><b>Example 3:</b> "Rich should be taxed more to help poor"</li>
        </ul>
      </div>
    </div>
  </div>`},

  // ── 13. GLOSSARY ──────────────────────────────────────
  { id:'s13', title:'Important Terms — Quick Reference', html:`
  <div class="si">
    <div class="hrow">
      <span class="hbadge" style="background:var(--yel);color:#192E1C">📖</span>
      <span class="htitle" style="color:var(--yel)">Important Terms — Quick Reference</span>
    </div>
    <div class="hdiv" style="background:var(--yel)"></div>
    <div class="gloss-grid">
      <div class="gcard"><div class="gterm">Scarcity</div><div class="gdef">Resources are limited relative to unlimited human wants. The root cause of all economic problems.</div></div>
      <div class="gcard"><div class="gterm">Opportunity Cost</div><div class="gdef">Value of the next best alternative given up when a choice is made. Also called Economic Cost / Alternative Cost.</div></div>
      <div class="gcard"><div class="gterm">PPC / PPF</div><div class="gdef">Curve showing all maximum combinations of two goods that can be produced with given resources and technology.</div></div>
      <div class="gcard"><div class="gterm">MRT (Marginal Rate of Transformation)</div><div class="gdef">Units of one good sacrificed to gain one additional unit of another. Equals the slope of PPC. Increases along PPC.</div></div>
      <div class="gcard"><div class="gterm">Microeconomics</div><div class="gdef">Study of individual economic units — consumer, firm, industry. Deals with price determination, factor pricing.</div></div>
      <div class="gcard"><div class="gterm">Macroeconomics</div><div class="gdef">Study of the economy as a whole — GDP, inflation, unemployment, monetary &amp; fiscal policy.</div></div>
      <div class="gcard"><div class="gterm">Positive Economics</div><div class="gdef">Factual statements about what IS. Objective, verifiable, and based on empirical evidence.</div></div>
      <div class="gcard"><div class="gterm">Normative Economics</div><div class="gdef">Value judgements about what SHOULD BE. Subjective and based on ethical/moral perspectives.</div></div>
    </div>
  </div>`},

  // ── 14. SCARCITY CHAIN ────────────────────────────────
  { id:'s14', title:'Scarcity → Choice → Economic Problem', html:`
  <div class="si">
    <div class="hrow">
      <span class="hbadge" style="background:var(--yel);color:#192E1C">Ch 1</span>
      <span class="htitle" style="color:var(--yel)">Scarcity, Choice &amp; the Economic Problem</span>

/* ═══════════════════════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════════════════════ */
const slideWrapper = document.getElementById('slide-wrapper');
const slideContent = document.getElementById('slide-content');
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
let scale = 1;

function setScale() {
  const area = document.getElementById('slide-area');
  const maxW = area.clientWidth - 32;
  const maxH = area.clientHeight - 70;
  const scaleW = maxW / 1280;
  const scaleH = maxH / 720;
  scale = Math.min(scaleW, scaleH, 1.5);
  const displayW = Math.round(1280 * scale);
  const displayH = Math.round(720 * scale);
  slideWrapper.style.width = displayW + 'px';
  slideWrapper.style.height = displayH + 'px';
  slideContent.style.transform = `scale(${scale})`;
  canvas.width = displayW;
  canvas.height = displayH;
  restoreDrawing();
}

/* ═══════════════════════════════════════════════════════════
   DRAWING SYSTEM
═══════════════════════════════════════════════════════════ */
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left),
    y: (e.clientY - rect.top)
  };
}

canvas.addEventListener('pointerdown', e => {
  if (tool === 'eraser') {
    isDrawing = true;
    pushUndo();
    canvas.setPointerCapture(e.pointerId);
    const p = getCanvasPos(e);
    const sz = penSize * scale * 4;
    ctx.clearRect(p.x - sz/2, p.y - sz/2, sz, sz);
    lastX = p.x; lastY = p.y;
    return;
  }
  isDrawing = true;
  points = [];
  pushUndo();
  canvas.setPointerCapture(e.pointerId);
  const p = getCanvasPos(e);
  const pressure = e.pressure > 0 ? e.pressure : 0.5;
  points.push({x: p.x, y: p.y, p: pressure});
  lastX = p.x; lastY = p.y;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
});

canvas.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  const p = getCanvasPos(e);
  const pressure = e.pressure > 0 ? e.pressure : 0.5;

  if (tool === 'eraser') {
    const sz = penSize * scale * 5;
    ctx.clearRect(p.x - sz/2, p.y - sz/2, sz, sz);
    return;
  }

  points.push({x: p.x, y: p.y, p: pressure});
  if (points.length < 3) return;

  const prev = points[points.length - 2];
  const curr = points[points.length - 1];
  const midX = (prev.x + curr.x) / 2;
  const midY = (prev.y + curr.y) / 2;
  const lw = tool === 'highlighter'
    ? penSize * scale * 8
    : penSize * scale * (0.5 + pressure * 1.5);

  ctx.strokeStyle = penColor;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalAlpha = tool === 'highlighter' ? penOpacity * 0.35 : penOpacity;
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.quadraticCurveTo(prev.x, prev.y, midX, midY);
  ctx.stroke();
  lastX = midX; lastY = midY;
});

canvas.addEventListener('pointerup', e => {
  if (!isDrawing) return;
  isDrawing = false;
  if (points.length === 1) {
    const p = points[0];
    ctx.globalAlpha = penOpacity;
    ctx.fillStyle = penColor;
    ctx.beginPath();
    ctx.arc(p.x, p.y, penSize * scale * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  points = [];
  saveDrawing();
});

canvas.addEventListener('pointerleave', e => {
  if (isDrawing) { isDrawing = false; saveDrawing(); }
});

/* ═══════════════════════════════════════════════════════════
   DRAWING STORAGE
═══════════════════════════════════════════════════════════ */
function saveDrawing() {
  const id = slides[currentIdx].id;
  slideDrawings.set(id, canvas.toDataURL());
}

function restoreDrawing() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const id = slides[currentIdx].id;
  const saved = slideDrawings.get(id);
  if (saved) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    };
    img.src = saved;
  }
}

function pushUndo() {
  const id = slides[currentIdx].id;
  if (!slideUndoStacks.has(id)) slideUndoStacks.set(id, []);
  const stack = slideUndoStacks.get(id);
  stack.push(canvas.toDataURL());
  if (stack.length > 25) stack.shift();
}

function undoStroke() {
  const id = slides[currentIdx].id;
  const stack = slideUndoStacks.get(id);
  if (!stack || stack.length === 0) { showToast('Nothing to undo'); return; }
  const prev = stack.pop();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (prev) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      saveDrawing();
    };
    img.src = prev;
  } else {
    saveDrawing();
  }
  showToast('Undo ✓');
}

function clearSlideDrawing() {
  if (!confirm('Clear all drawings on this slide?')) return;
  pushUndo();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  saveDrawing();
  showToast('Cleared');
}

/* ═══════════════════════════════════════════════════════════
   TOOL CONTROLS
═══════════════════════════════════════════════════════════ */
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-'+t).classList.add('active');
  canvas.style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
}

function setColor(el) {
  penColor = el.dataset.color;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  if (tool === 'eraser') setTool('pen');
}

function updateSize(v) {
  penSize = +v;
  document.getElementById('sz-label').textContent = v + 'px';
}

function updateOpacity(v) {
  penOpacity = v / 100;
}

/* ═══════════════════════════════════════════════════════════
   SLIDE NAVIGATION
═══════════════════════════════════════════════════════════ */
function goToSlide(idx) {
  if (idx < 0 || idx >= slides.length) return;
  currentIdx = idx;
  slideContent.innerHTML = slides[idx].html;
  updateNav();
  restoreDrawing();
  updateSidebar();
}

function navigate(dir) {
  goToSlide(currentIdx + dir);
}

function updateNav() {
  document.getElementById('slide-ind').textContent = `${currentIdx+1} / ${slides.length}`;
  document.getElementById('prev-btn').disabled = currentIdx === 0;
  document.getElementById('next-btn').disabled = currentIdx === slides.length - 1;
}

/* ═══════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════ */
function updateSidebar() {
  const list = document.getElementById('slides-list');
  list.innerHTML = '';
  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 's-thumb' + (i === currentIdx ? ' active' : '');
    div.innerHTML = `
      <div class="s-thumb-inner" style="background:${i===currentIdx?'var(--panel2)':'var(--bg)'}">
        <div class="s-thumb-num">Slide ${i+1}</div>
        <div class="s-thumb-title">${s.title}</div>
      </div>
      <button class="s-thumb-del" onclick="event.stopPropagation();deleteSlide(${i})" title="Delete slide">✕</button>
    `;
    div.addEventListener('click', () => goToSlide(i));
    list.appendChild(div);
  });
  // scroll active into view
  const active = list.querySelector('.active');
  if (active) active.scrollIntoView({block:'nearest'});
}

/* ═══════════════════════════════════════════════════════════
   SLIDE MANAGEMENT
═══════════════════════════════════════════════════════════ */
function deleteSlide(idx) {
  if (slides.length <= 1) { showToast('Cannot delete the only slide'); return; }
  if (!confirm(`Delete "${slides[idx].title}"?`)) return;
  slideDrawings.delete(slides[idx].id);
  slideUndoStacks.delete(slides[idx].id);
  slides.splice(idx, 1);
  if (currentIdx >= slides.length) currentIdx = slides.length - 1;
  goToSlide(currentIdx);
  showToast('Slide deleted');
}

let selectedTplType = 'blank';

function openModal() {
  selectedTplType = 'blank';
  document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('sel'));
  document.querySelector('[data-tpl="blank"]').classList.add('sel');
  document.getElementById('m-title').value = '';
  document.getElementById('m-sub').value = '';
  document.getElementById('m-left').value = '';
  document.getElementById('m-right').value = '';
  updateModalInputs();
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function selectTpl(el, type) {
  selectedTplType = type;
  document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  updateModalInputs();
}

function updateModalInputs() {
  const t = selectedTplType;
  document.getElementById('tpl-title-group').style.display = t === 'blank' ? 'none' : '';
  document.getElementById('tpl-left-group').style.display = t === 'two-col' ? '' : 'none';
  document.getElementById('tpl-right-group').style.display = t === 'two-col' ? '' : 'none';
  document.getElementById('tpl-sub-group').style.display = t === 'title' ? '' : 'none';
}

function generateSlideHTML(type, title, sub, left, right) {
  const id = 'custom-' + Date.now();
  if (type === 'blank') {
    return { id, title:'Blank Slide', html:`<div class="si"><div class="blank-hint"><div class="bh-icon">✏️</div><div class="bh-text">Use your pen to write notes here</div></div></div>` };
  }
  if (type === 'title') {
    const t = title || 'New Topic';
    const s = sub || 'Class 11 Economics';
    return { id, title:t, html:`<div class="si"><div class="title-si"><div class="t-eyebrow">Class 11 &nbsp;·&nbsp; Economics</div><div class="t-main">${t}</div><div class="t-pills"><div class="t-pill">${s}</div></div></div></div>` };
  }
  if (type === 'two-col') {
    const t = title || 'Comparison';
    const l = left || 'Left Column';
    const r = right || 'Right Column';
    return { id, title:t, html:`<div class="si"><div class="hrow"><span class="htitle" style="color:var(--yel)">${t}</span></div><div class="hdiv" style="background:var(--yel)"></div><div class="two-col"><div class="card"><div class="ctitle" style="color:var(--blue)">${l}</div><ul class="cbody"><li>Point 1</li><li>Point 2</li><li>Point 3</li></ul></div><div class="card"><div class="ctitle" style="color:var(--yel)">${r}</div><ul class="cbody"><li>Point 1</li><li>Point 2</li><li>Point 3</li></ul></div></div></div>` };
  }
  if (type === 'bullet') {
    const t = title || 'Key Points';
    return { id, title:t, html:`<div class="si"><div class="hrow"><span class="htitle" style="color:var(--yel)">${t}</span></div><div class="hdiv" style="background:var(--yel)"></div><div class="card" style="flex:1"><div class="ctitle" style="color:var(--yel)">📌 ${t}</div><ul class="cbody"><li>Write your first key point here</li><li>Add your second point</li><li>Third important concept</li><li>Use your pen to annotate!</li></ul></div></div>` };
  }
}

function addSlide() {
  const title = document.getElementById('m-title').value;
  const sub = document.getElementById('m-sub').value;
  const left = document.getElementById('m-left').value;
  const right = document.getElementById('m-right').value;
  const newSlide = generateSlideHTML(selectedTplType, title, sub, left, right);
  slides.splice(currentIdx + 1, 0, newSlide);
  closeModal();
  goToSlide(currentIdx + 1);
  showToast('Slide added ✓');
}

/* ═══════════════════════════════════════════════════════════
   SAVE & EXPORT
═══════════════════════════════════════════════════════════ */
async function captureSlide(idx) {
  const prevIdx = currentIdx;
  goToSlide(idx);
  await new Promise(r => setTimeout(r, 80));
  const el = document.getElementById('slide-wrapper');
  const cvs = await html2canvas(el, {
    scale: 1280 / el.offsetWidth,
    useCORS: true,
    backgroundColor: '#192E1C',
    logging: false
  });
  goToSlide(prevIdx);
  return cvs;
}

async function saveSlideAsPNG() {
  showToast('Saving slide...');
  try {
    const cvs = await captureSlide(currentIdx);
    const link = document.createElement('a');
    const title = slides[currentIdx].title.replace(/[^a-z0-9]/gi,'_').toLowerCase();
    link.download = `slide_${currentIdx+1}_${title}.png`;
    link.href = cvs.toDataURL('image/png');
    link.click();
    showToast('Saved as PNG ✓');
  } catch(e) {
    showToast('Error saving: ' + e.message);
  }
}

async function exportAllPDF() {
  if (!window.jspdf) { showToast('Loading PDF library...'); await new Promise(r => setTimeout(r, 500)); }
  showToast('Exporting PDF... please wait');
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'landscape', unit:'px', format:[1280,720] });
    for (let i = 0; i < slides.length; i++) {
      showToast(`Exporting slide ${i+1} / ${slides.length}...`);
      const cvs = await captureSlide(i);
      const imgData = cvs.toDataURL('image/jpeg', 0.92);
      if (i > 0) pdf.addPage([1280,720],'landscape');
      pdf.addImage(imgData,'JPEG',0,0,1280,720);
    }
    const deckTitle = document.getElementById('deck-title-input').value || 'slides';
    pdf.save(deckTitle.replace(/[^a-z0-9]/gi,'_') + '.pdf');
    showToast('PDF exported ✓');
  } catch(e) {
    showToast('Export error: ' + e.message);
    console.error(e);
  }
}

/* ═══════════════════════════════════════════════════════════
   PRESENTATION MODE
═══════════════════════════════════════════════════════════ */
const presMode = document.getElementById('pres-mode');
const presContent = document.getElementById('pres-content');
const presCanvas = document.getElementById('pres-canvas');
const presCtx = presCanvas.getContext('2d');
let presScale = 1;
let presLast = {x:0,y:0};
let presPoints = [];

function enterPresentation() {
  presIdx = currentIdx;
  presMode.classList.add('show');
  scalePresentation();
  renderPres();
}

function exitPresentation() {
  presMode.classList.remove('show');
}

function scalePresentation() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  const scaleW = maxW / 1280;
  const scaleH = maxH / 720;
  presScale = Math.min(scaleW, scaleH);
  const w = Math.round(1280 * presScale);
  const h = Math.round(720 * presScale);
  const pw = document.getElementById('pres-wrapper');
  pw.style.width = w + 'px';
  pw.style.height = h + 'px';
  presContent.style.transform = `scale(${presScale})`;
  presCanvas.width = w;
  presCanvas.height = h;
}

function renderPres() {
  presContent.innerHTML = slides[presIdx].html;
  document.getElementById('pres-ind').textContent = `${presIdx+1} / ${slides.length}`;
  presCtx.clearRect(0,0,presCanvas.width,presCanvas.height);
  const saved = slideDrawings.get(slides[presIdx].id);
  if (saved) {
    const img = new Image();
    img.onload = () => presCtx.drawImage(img,0,0,presCanvas.width,presCanvas.height);
    img.src = saved;
  }
}

function presNavigate(dir) {
  const next = presIdx + dir;
  if (next < 0 || next >= slides.length) return;
  presIdx = next;
  renderPres();
}

// Presentation drawing
presCanvas.addEventListener('pointerdown', e => {
  presIsDrawing = true;
  presCanvas.setPointerCapture(e.pointerId);
  const rect = presCanvas.getBoundingClientRect();
  presLast = {x: e.clientX-rect.left, y: e.clientY-rect.top};
  presPoints = [presLast];
});
presCanvas.addEventListener('pointermove', e => {
  if (!presIsDrawing) return;
  const rect = presCanvas.getBoundingClientRect();
  const p = {x: e.clientX-rect.left, y: e.clientY-rect.top};
  const pressure = e.pressure > 0 ? e.pressure : 0.5;
  presPoints.push(p);
  if (presPoints.length < 2) return;
  const prev = presPoints[presPoints.length-2];
  presCtx.strokeStyle = penColor;
  presCtx.lineWidth = penSize * presScale * (0.5 + pressure*1.5);
  presCtx.lineCap = 'round'; presCtx.lineJoin = 'round';
  presCtx.globalAlpha = penOpacity;
  presCtx.beginPath();
  presCtx.moveTo(presLast.x, presLast.y);
  const midX = (prev.x+p.x)/2, midY = (prev.y+p.y)/2;
  presCtx.quadraticCurveTo(prev.x, prev.y, midX, midY);
  presCtx.stroke();
  presLast = {x:midX,y:midY};
});
presCanvas.addEventListener('pointerup', () => {
  presIsDrawing = false;
  presCtx.globalAlpha = 1;
  // sync back to main
  const id = slides[presIdx].id;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(presCanvas, 0, 0, canvas.width, canvas.height);
  slideDrawings.set(id, tempCanvas.toDataURL());
  presPoints = [];
});

/* ═══════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoStroke(); return; }
  if (e.key === 'p' || e.key === 'P') setTool('pen');
  if (e.key === 'h' || e.key === 'H') setTool('highlighter');
  if (e.key === 'e' || e.key === 'E') setTool('eraser');
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
  if (e.key === 'F5' || e.key === 'f') { e.preventDefault(); enterPresentation(); }
  if (e.key === 'Escape') exitPresentation();
});

/* ═══════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
window.addEventListener('resize', () => { setScale(); });
window.addEventListener('load', () => {
  setScale();
  goToSlide(0);
});
</script>
